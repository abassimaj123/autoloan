name: auto_loan
description: Auto Loan Calculator — CA / UK / US
publish_to: 'none'
version: 1.0.6+4

environment:
  sdk: ^3.11.4

dependencies:
  calcwise_core:
    path: ../packages/calcwise_core
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter


  # ── Core ──────────────────────────────────────────────────────────────────
  intl: ^0.20.0
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  in_app_purchase: ^3.2.0
  in_app_review: ^2.0.9

  # ── Ads & Firebase ────────────────────────────────────────────────────────
  # Android: configured via productFlavors + google-services.json per flavor
  # TODO: iOS — add GoogleService-Info.plist per flavor target
  google_mobile_ads: ^5.1.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # ── Export / Share ────────────────────────────────────────────────────────
  # Android: tested. TODO: iOS — test share sheet + PDF on iOS
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # ── Links ─────────────────────────────────────────────────────────────────
  url_launcher: ^6.3.0
  flutter_native_splash: ^2.4.1

  # ── UI ────────────────────────────────────────────────────────────────────
  # cupertino_icons: used for cross-platform icon widgets (safe on Android)
  # TODO: iOS — verify icon appearance on iOS devices
  cupertino_icons: ^1.0.8
  fl_chart: ^0.69.0

dev_dependencies:
  calcwise_lint:
    git:
      url: https://github.com/abassimaj123/calcwise_core.git
      path: calcwise_lint
      ref: main
  custom_lint: ">=0.6.0 <0.8.0"
  flutter_launcher_icons: ^0.14.1
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/ca/
    - assets/images/us/
    - assets/images/uk/
    - assets/icons/

flutter_launcher_icons:
  android: true
  ios: false
  image_path_android: "assets/icons/icon_foreground.png"
  adaptive_icon_background: "#FFFFFF"
  adaptive_icon_foreground: "assets/icons/icon_foreground.png"
  min_sdk_android: 21
  web:
    generate: false
  windows:
    generate: false




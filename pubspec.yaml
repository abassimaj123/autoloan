name: auto_loan
description: Auto Loan Calculator — CA / AU / US
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.4

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # ── Core ──────────────────────────────────────────────────────────────────
  intl: ^0.20.2
  provider: ^6.1.2
  shared_preferences: ^2.3.2

  # ── Ads & Firebase ────────────────────────────────────────────────────────
  # Android: configured via productFlavors + google-services.json per flavor
  # TODO: iOS — add GoogleService-Info.plist per flavor target
  google_mobile_ads: ^5.1.0
  firebase_core: ^3.6.0
  firebase_analytics: ^11.3.3
  firebase_crashlytics: ^4.1.3

  # ── Export / Share ────────────────────────────────────────────────────────
  # Android: tested. TODO: iOS — test share sheet + PDF on iOS
  pdf: ^3.11.1
  printing: ^5.13.1
  path_provider: ^2.1.4
  share_plus: ^10.0.2

  # ── UI ────────────────────────────────────────────────────────────────────
  # cupertino_icons: used for cross-platform icon widgets (safe on Android)
  # TODO: iOS — verify icon appearance on iOS devices
  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/ca/
    - assets/images/us/
    - assets/images/uk/
